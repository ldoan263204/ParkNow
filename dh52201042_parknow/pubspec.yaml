name: dh52201042_parknow
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  intl: ^0.20.0
  # Phase 2: Hardware & Map
  mobile_scanner: ^7.0.1          # QR code scanning
  permission_handler: ^11.4.0     # Runtime GPS permission
  geolocator: ^13.0.4             # Get current location
  image_picker: ^1.1.2            # Camera / Gallery upload
  qr_flutter: ^4.1.0              # Sinh mã QR từ staffCode

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.5                 # Unit test mocking
  build_runner: ^2.4.15           # Code generation for mockito

flutter:
  uses-material-design: true

  # Khai báo các thư mục chứa tài nguyên tĩnh
  assets:
    - assets/images/
    - assets/icons/

  # Khai báo font chữ (Nếu sau này bạn có dùng font custom thì bỏ comment phần dưới)
  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: assets/fonts/CustomFont-Regular.ttf